services:
  gateway:
    build:
      context: ..
      dockerfile: docker/gateway.Dockerfile
    expose:
      - "8787"

  ros2-backend:
    build:
      context: ..
      dockerfile: apps/examples/ros2-backend/Dockerfile
    environment:
      PORT: "8080"
      ROS2_TENANT_ID: tenant_robotics
      ROS2_ALLOWED_TOPICS: cmd_vel,battery_state,odom
    expose:
      - "8080"

  examples-portal:
    build:
      context: ..
      dockerfile: docker/frontend.Dockerfile
      args:
        APP_DIR: apps/examples/examples-portal
        VITE_BLADB_URL: /api
        VITE_EXAMPLE_PORTAL_URL: ${BLADB_EXAMPLES_PORTAL_URL:-http://127.0.0.1:4172}
        VITE_EXAMPLE_FLASH_SALE_URL: ${BLADB_FLASH_SALE_URL:-http://127.0.0.1:4173}
        VITE_EXAMPLE_BLOG_URL: ${BLADB_BLOG_URL:-http://127.0.0.1:4174}
        VITE_EXAMPLE_IOT_URL: ${BLADB_IOT_URL:-http://127.0.0.1:4175}
        VITE_EXAMPLE_ROS2_URL: ${BLADB_ROS2_URL:-http://127.0.0.1:4176}
        VITE_EXAMPLE_USER_MODULE_DEMO_URL: ${BLADB_USER_MODULE_DEMO_URL:-http://127.0.0.1:4177}
        VITE_EXAMPLE_ROS2_BACKEND_URL: ${BLADB_ROS2_BACKEND_URL:-http://127.0.0.1:8080}
    depends_on:
      - gateway
      - ros2-backend
    expose:
      - "80"

  flash-sale:
