services:
  gateway:
    build:
      context: ..
      dockerfile: docker/gateway.Dockerfile
    expose:
      - "8787"

  ros2-backend:
    build:
      context: ..
      dockerfile: apps/examples/ros2-backend/Dockerfile
    environment:
      PORT: "8080"
      ROS2_TENANT_ID: tenant_robotics
      ROS2_ALLOWED_TOPICS: cmd_vel,battery_state,odom
    expose:
      - "8080"

  flash-sale:
    build:
      context: ..
      dockerfile: docker/frontend.Dockerfile
      args:
        APP_DIR: apps/examples/flash-sale
        VITE_BLADB_URL: /api
    depends_on:
      - gateway
    expose:
      - "80"

  iot-realtime:
    build:
      context: ..
      dockerfile: docker/frontend.Dockerfile
      args:
        APP_DIR: apps/examples/iot-realtime
        VITE_BLADB_URL: /api
    depends_on:
      - gateway
    expose:
      - "80"

  ros2-bridge:
    build:
      context: ..
      dockerfile: docker/frontend.Dockerfile
      args:
        APP_DIR: apps/examples/ros2-bridge
        VITE_BLADB_URL: /api
    depends_on:
      - gateway
      - ros2-backend
    expose:
      - "80"

  user-module-demo:
    build:
      context: ..
      dockerfile: docker/frontend.Dockerfile
      args:
        APP_DIR: apps/examples/user-module-demo
        VITE_BLADB_URL: /api
    depends_on:
      - gateway
    expose:
      - "80"
