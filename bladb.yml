mode: standalone

gateway:
  runtimes:
    - name: flash-sale
      policy: apps/examples/flash-sale/policies/flash-sale.policy.yaml
      topology: apps/examples/flash-sale/topology/flash-sale.topology.yaml
      defaultAuth:
        uid: u_2001
        tenantId: tenant_flashsale
        roles:
          - buyer
        permissionVersion: v1

    - name: iot-realtime
      policy: apps/examples/iot-realtime/policies/iot-realtime.policy.yaml
      topology: apps/examples/iot-realtime/topology/iot-realtime.topology.yaml
      defaultAuth:
        uid: u_1001
        tenantId: tenant_a
        roles:
          - operator
        permissionVersion: v1

    - name: ros2-bridge
      policy: apps/examples/ros2-bridge/policies/ros2-bridge.policy.yaml
      topology: apps/examples/ros2-bridge/topology/ros2-bridge.topology.yaml
      defaultAuth:
        uid: u_3001
        tenantId: tenant_robotics
        roles:
          - operator
        permissionVersion: v1

  auth:
    users:
      - app: flash-sale
        uid: u_2001
        tenantId: tenant_flashsale
        email: buyer@flash-sale.demo
        password: demo123
        displayName: Flash Buyer
        roles:
          - buyer

      - app: iot-realtime
        uid: u_1001
        tenantId: tenant_a
        email: operator@iot.demo
        password: demo123
        displayName: IoT Operator
        roles:
          - operator

      - app: ros2-bridge
        uid: u_3001
        tenantId: tenant_robotics
        email: operator@ros2.demo
        password: demo123
        displayName: Robot Operator
        roles:
          - operator

