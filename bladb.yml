mode: standalone

modules:
  official:
    users:
      enabled: true
      session:
        transport: gateway-auth
      jwt:
        algorithm: HS256
        secret: ${BLADB_JWT_SECRET}
      password:
        algorithm: argon2id
      storage:
        engine: mysql
        mysql:
          dsn: ${BLADB_USERS_MYSQL_DSN}
        mongodb:
          uri: ${BLADB_USERS_MONGODB_URI}
          database: bladb_users
      mailer:
        provider: smtp
        from: no-reply@example.com
        smtp:
          host: smtp.example.com
          port: 587
          username: ${BLADB_SMTP_USER}
          password: ${BLADB_SMTP_PASS}
      features:
        register: true
        login: true
        verifyEmail: false
        resetPassword: false

gateway:
  runtimes:
    - name: flash-sale
      policy: apps/examples/flash-sale/policies/flash-sale.policy.yaml
      topology: apps/examples/flash-sale/topology/flash-sale.topology.yaml
      defaultAuth:
        uid: u_2001
        tenantId: tenant_flashsale
        roles:
          - buyer
        permissionVersion: v1

    - name: iot-realtime
      policy: apps/examples/iot-realtime/policies/iot-realtime.policy.yaml
      topology: apps/examples/iot-realtime/topology/iot-realtime.topology.yaml
      defaultAuth:
        uid: u_1001
        tenantId: tenant_a
        roles:
          - operator
        permissionVersion: v1

    - name: blog
      policy: apps/examples/blog/policies/blog.policy.yaml
      topology: apps/examples/blog/topology/blog.topology.yaml
      defaultAuth:
        uid: u_5001
        tenantId: tenant_blog
        roles:
          - editor
        permissionVersion: v1

    - name: ros2-bridge
      policy: apps/examples/ros2-bridge/policies/ros2-bridge.policy.yaml
      topology: apps/examples/ros2-bridge/topology/ros2-bridge.topology.yaml
      defaultAuth:
        uid: u_3001
        tenantId: tenant_robotics
        roles:
          - operator
        permissionVersion: v1

  auth:
    users:
      - app: flash-sale
        uid: u_2001
        tenantId: tenant_flashsale
        email: buyer@flash-sale.demo
        password: demo123
        displayName: Flash Buyer
        roles:
          - buyer

      - app: iot-realtime
        uid: u_1001
        tenantId: tenant_a
        email: operator@iot.demo
        password: demo123
        displayName: IoT Operator
        roles:
          - operator

      - app: blog
        uid: u_5001
        tenantId: tenant_blog
        email: editor@blog.demo
        password: demo123
        displayName: Blog Editor
        roles:
          - editor

      - app: ros2-bridge
        uid: u_3001
        tenantId: tenant_robotics
        email: operator@ros2.demo
        password: demo123
        displayName: Robot Operator
        roles:
          - operator

      - app: user-module-demo
        uid: u_4001
        tenantId: tenant_local
        email: member@user.demo
        password: demo123
        displayName: Demo Member
        roles:
          - member

  modules:
    blog:
      allowAnonymousAppAccess: true
      posts:
        - id: post_0001
          tenantId: tenant_blog
          authorUid: u_5001
          authorName: Blog Editor
          title: Welcome to the Bladb blog example
          slug: welcome-to-the-bladb-blog-example
          summary: A seeded article that demonstrates list and mine flows.
          body: This example shows how db.user and db.mongo can power a small content workflow.
          published: true
          createdAt: 2026-05-06T08:00:00Z
        - id: post_0002
          tenantId: tenant_blog
          authorUid: u_5001
          authorName: Blog Editor
          title: Drafting with tenant-aware storage
          slug: drafting-with-tenant-aware-storage
          summary: A second post to make the public list feel real.
