workers:
  - name: telemetry.latest-projector
    trigger:
      type: event
      topic: telemetry.received
      transport:
        kind: jetStream
        stream: BLADB_IOT_EVENTS
        consumer: iot-telemetry-latest-projector
        subject: events.iot.telemetry.received
    source: mqtt.devices.telemetry
    identity:
      mode: inherit-actor
    idempotency:
      keyFrom: event.eventId
    retry:
      maxAttempts: 5
      backoff: exponential
    timeoutMs: 12000
    deployment:
      minReplicas: 2
      maxReplicas: 12
      maxConcurrency: 32
      rollingMaxUnavailable: 1
    steps:
      - use: mongo
        action: upsert
        collection: telemetry_latest

  - name: telemetry.counter-updater
    trigger:
      type: event
      topic: telemetry.received
      transport:
        kind: jetStream
        stream: BLADB_IOT_EVENTS
        consumer: iot-telemetry-counter-updater
        subject: events.iot.telemetry.received
    source: mqtt.devices.telemetry
    identity:
      mode: system
      as: worker.telemetry-counter-updater
    idempotency:
      keyFrom: event.payload.deviceId
    retry:
      maxAttempts: 5
      backoff: exponential
    timeoutMs: 5000
    deployment:
      minReplicas: 2
      maxReplicas: 15
      maxConcurrency: 64
      rollingMaxUnavailable: 1
    steps:
      - use: redis
        action: setOnlineState
        keyTemplate: "iot:{event.actor.tenantId}:devices:{event.payload.deviceId}:online"
      - use: redis
        action: recomputeCounter
        keyTemplate: "iot:{event.actor.tenantId}:active-count"

  - name: telemetry.alert-evaluator
    trigger:
      type: event
      topic: telemetry.received
      transport:
        kind: jetStream
        stream: BLADB_IOT_EVENTS
        consumer: iot-telemetry-alert-evaluator
        subject: events.iot.telemetry.received
    source: mqtt.devices.telemetry
    identity:
      mode: system
      as: worker.telemetry-alert-evaluator
    idempotency:
      keyFrom: event.eventId
    retry:
      maxAttempts: 8
      backoff: exponential
    deadLetter:
      subject: dlq.iot.telemetry.alert-evaluator
    timeoutMs: 10000
    deployment:
      minReplicas: 2
      maxReplicas: 20
      maxConcurrency: 32
      rollingMaxUnavailable: 1
    steps:
      - use: nats
        action: conditionalProduce
        topic: events.iot.device.alert.raised
      - use: mongo
        action: insertOne
        collection: alert_history
