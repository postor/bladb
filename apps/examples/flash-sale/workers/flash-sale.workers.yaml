workers:
  - name: order.analytics-sync
    trigger:
      type: event
      topic: order.created
      transport:
        kind: jetStream
        stream: BLADB_FLASHSALE_EVENTS
        consumer: flashsale-order-analytics
        subject: events.flashsale.order.created
    source: sql.orders
    identity:
      mode: inherit-actor
    idempotency:
      keyFrom: event.eventId
    retry:
      maxAttempts: 5
      backoff: exponential
    timeoutMs: 15000
    deployment:
      minReplicas: 2
      maxReplicas: 8
      maxConcurrency: 32
      rollingMaxUnavailable: 1
    steps:
      - use: mongo
        action: upsert
        collection: order_snapshots
      - use: nats
        action: produce
        topic: events.flashsale.analytics.order.created

  - name: order.payment-timeout-scheduler
    trigger:
      type: event
      topic: order.created
      transport:
        kind: jetStream
        stream: BLADB_FLASHSALE_EVENTS
        consumer: flashsale-payment-timeout-scheduler
        subject: events.flashsale.order.created
    source: sql.orders
    identity:
      mode: system
      as: worker.order-payment-timeout-scheduler
    idempotency:
      keyFrom: event.payload.orderId
    retry:
      maxAttempts: 3
      backoff: exponential
    timeoutMs: 8000
    deployment:
      minReplicas: 1
      maxReplicas: 10
      maxConcurrency: 16
      rollingMaxUnavailable: 1
    steps:
      - use: nats
        action: publishDelayed
        queue: queue.flashsale.order.payment.timeout
        delayMs: 900000

  - name: order.payment-timeout-handler
    trigger:
      type: queue
      queue: queue.flashsale.order.payment.timeout
      transport:
        kind: jetStream
        stream: BLADB_FLASHSALE_JOBS
        consumer: flashsale-payment-timeout-handler
        subject: queue.flashsale.order.payment.timeout
    source: mq.order.payment.timeout
    identity:
      mode: system
      as: worker.order-payment-timeout-handler
    idempotency:
      keyFrom: job.payload.orderId
    retry:
      maxAttempts: 10
      backoff: exponential
    deadLetter:
      subject: dlq.flashsale.order.payment.timeout
    timeoutMs: 20000
    deployment:
      minReplicas: 1
      maxReplicas: 10
      maxConcurrency: 8
      rollingMaxUnavailable: 1
    steps:
      - use: sql
        action: conditionalUpdate
        table: orders
      - use: redis
        action: incrby
        keyTemplate: "flashsale:{job.payload.sku}:stock"
      - use: nats
        action: produce
        topic: events.flashsale.order.cancelled
